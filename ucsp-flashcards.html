<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #eeece8;
    --text: #1a1a1a;
    --text-secondary: #666660;
    --border: rgba(0,0,0,0.12);
    --border-md: rgba(0,0,0,0.22);
    --blue: #185FA5;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #252522;
      --bg-tertiary: #2e2e2b;
      --text: #f0ede8;
      --text-secondary: #999890;
      --border: rgba(255,255,255,0.1);
      --border-md: rgba(255,255,255,0.2);
      --blue: #5BA4E8;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg-tertiary);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .page-wrap { max-width: 680px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 2rem; }
  header h1 { font-size: 22px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  header p { font-size: 14px; color: var(--text-secondary); }

  .lesson-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }

  .tab-btn {
    padding: 6px 13px; border-radius: 20px;
    border: 0.5px solid var(--border-md);
    background: var(--bg); color: var(--text-secondary);
    font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .tab-btn:hover { background: var(--bg-secondary); }
  .tab-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

  .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .prog-bar { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--blue); border-radius: 3px; transition: width 0.3s; }
  .prog-label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }

  .card-area {
    perspective: 900px; margin-bottom: 1rem;
    cursor: pointer; user-select: none; min-height: 220px;
  }
  .card-inner {
    position: relative; width: 100%; min-height: 220px;
    transform-style: preserve-3d; transition: transform 0.45s;
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; width: 100%; min-height: 220px;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border: 0.5px solid var(--border); border-radius: var(--radius-lg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2rem 1.5rem; text-align: center;
  }
  .card-front { background: var(--bg); }
  .card-back  { background: var(--bg-secondary); transform: rotateY(180deg); }

  .lesson-label {
    display: inline-block; font-size: 11px; font-weight: 500;
    padding: 3px 10px; border-radius: 12px; margin-bottom: 0.75rem; letter-spacing: 0.02em;
  }
  .card-tag {
    font-size: 11px; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.75rem;
  }
  .card-q { font-size: 20px; font-weight: 500; color: var(--text); line-height: 1.5; }
  .card-a { font-size: 15px; color: var(--text); line-height: 1.7; }
  .card-hint { font-size: 12px; color: var(--text-secondary); margin-top: 1.25rem; }

  .nav-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; margin-bottom: 0.75rem;
  }
  .nav-btn, .shuffle-btn {
    padding: 8px 20px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border-md);
    background: var(--bg); color: var(--text);
    font-size: 14px; cursor: pointer; transition: background 0.12s; font-family: inherit;
  }
  .nav-btn:hover, .shuffle-btn:hover { background: var(--bg-secondary); }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  .shuffle-btn { color: var(--text-secondary); font-size: 13px; }

  .counter { font-size: 13px; color: var(--text-secondary); text-align: center; margin-top: 0.5rem; }

  .keyboard-hint {
    text-align: center; font-size: 12px; color: var(--text-secondary);
    margin-top: 1.5rem; padding-top: 1rem; border-top: 0.5px solid var(--border);
  }
  kbd {
    display: inline-block; padding: 1px 6px;
    border: 0.5px solid var(--border-md); border-radius: 4px;
    font-size: 11px; font-family: inherit; background: var(--bg-secondary);
  }
</style>

function buildAllCards() {

  for (const [lesson, cards] of Object.entries(LESSONS)) {
    if (!cards) continue;
    cards.forEach(c => all.push({ lesson, q: c[0], a: c[1] }));
  }
  return all;
}

function getDeck(lesson) {
  if (lesson === "All") return buildAllCards();
  return (LESSONS[lesson] || []).map(c => ({ lesson, q: c[0], a: c[1] }));
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Render ─────────────────────────────────────────────────────
function render() {
  const card = deck[idx];
  const ci = document.getElementById("card-inner");
  ci.classList.remove("flipped");

  const lt = document.getElementById("card-lesson-tag");
  const col = COLORS[card.lesson] || COLORS["All"];
  lt.textContent = card.lesson;
  lt.style.background = col.bg;
  lt.style.color = col.text;

  document.getElementById("card-q").textContent = card.q;
  document.getElementById("card-a").textContent = card.a;

  const total = deck.length;
  document.getElementById("prog-fill").style.width = ((idx + 1) / total * 100) + "%";
  document.getElementById("prog-label").textContent = `${idx + 1} / ${total}`;
  document.getElementById("counter").textContent = `Card ${idx + 1} of ${total}`;
  document.getElementById("prev-btn").disabled = idx === 0;
  document.getElementById("next-btn").disabled = idx === total - 1;
}

function flipCard() {
  document.getElementById("card-inner").classList.toggle("flipped");
}

function move(dir) {
  const ni = idx + dir;
  if (ni < 0 || ni >= deck.length) return;
  idx = ni;
  render();
}

function shuffleDeck() {
  shuffle(deck);
  idx = 0;
  render();
}

function switchLesson(lesson) {
  activeLesson = lesson;
  deck = getDeck(lesson);
  idx = 0;
  document.querySelectorAll(".tab-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.lesson === lesson)
  );
  render();
}

// ── Build tabs ─────────────────────────────────────────────────
function buildTabs() {
  const container = document.getElementById("tabs");
  Object.keys(LESSONS).forEach(lesson => {
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (lesson === "All" ? " active" : "");
    btn.dataset.lesson = lesson;
    btn.textContent = lesson;
    btn.onclick = () => switchLesson(lesson);
    container.appendChild(btn);
  });
}

// ── Keyboard shortcuts ─────────────────────────────────────────
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (e.key === " " || e.code === "Space") { e.preventDefault(); flipCard(); }
  else if (e.key === "ArrowLeft")  move(-1);
  else if (e.key === "ArrowRight") move(1);
  else if (e.key === "s" || e.key === "S") shuffleDeck();
});

// ── Init ───────────────────────────────────────────────────────
buildTabs();
deck = getDeck("All");
render();
</script>
</body>
</html>
